name: Feature request
description: Propose a new feature or behavior change
labels: [enhancement]
body:
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: なぜこの機能が欲しいのか・何の問題を解くのか
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: どう実装するか・ユーザー体験はどうなるか
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: 他にどんな案を検討したか
    validations:
      required: false

  - type: checkboxes
    id: code-of-conduct
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's [Code of Conduct](https://github.com/sat0-hir0/limn/blob/main/CODE_OF_CONDUCT.md)
          required: true
