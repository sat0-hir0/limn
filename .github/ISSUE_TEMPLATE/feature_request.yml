name: Feature request
description: Propose a new feature or behavior change
title: "[feat] "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Tip: keep the `[feat] ` prefix in the title and fill in the
        rest with a short, specific summary.

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this feature needed? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: How should it be implemented? What does the user experience look like?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider?
    validations:
      required: false

  - type: checkboxes
    id: code-of-conduct
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's [Code of Conduct](https://github.com/sat0-hir0/limn/blob/main/CODE_OF_CONDUCT.md)
          required: true
