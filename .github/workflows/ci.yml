name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

# Shared step: gpui pulls in font-kit, x11, wayland, and Vulkan bits.
# Keep this list in sync with the gpui_platform features in
# Cargo.toml ([workspace.dependencies].gpui_platform).
jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: |
          rustup show
          rustup component add rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: |
          rustup show
          rustup component add clippy
      - name: Install gpui system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwayland-dev libxkbcommon-x11-dev \
            libfontconfig1-dev libssl-dev \
            libasound2-dev \
            pkg-config
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup show
      - name: Install gpui system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwayland-dev libxkbcommon-x11-dev \
            libfontconfig1-dev libssl-dev \
            libasound2-dev \
            pkg-config
      - uses: Swatinem/rust-cache@v2
      - name: cargo test
        run: cargo test --workspace
