# Codecov configuration. https://docs.codecov.com/docs/codecov-yaml
#
# Coverage targets are "auto" while M1 is the only landed milestone —
# we don't know what a reasonable steady-state number looks like yet.
# Tighten once M2 lands a meaningful editing path and the body of
# tests stabilises.

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: auto
        threshold: 5%

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false

ignore:
  - "crates/debt-scan/**"   # Developer tool, not product code.
  - "**/tests/**"
  - "**/main.rs"
