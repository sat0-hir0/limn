# Codecov configuration. https://docs.codecov.com/docs/codecov-yaml
#
# Coverage targets are currently "auto": the test suite is still
# small and a reasonable steady-state percentage is unknown. Tighten
# the thresholds once the body of tests stabilises.

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: auto
        threshold: 5%

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false

ignore:
  - "crates/debt-scan/**"   # Developer tool, not product code.
  - "**/tests/**"
  - "**/main.rs"
