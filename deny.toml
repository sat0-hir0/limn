[graph]
targets = []

[licenses]
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
]
confidence-threshold = 0.93
# Stay green when an allowed license is not used by any dep yet (M0 has
# no external deps; the allow list is forward-looking for M1+).
unused-allowed-license = "allow"

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Workspace-internal `path = "..."` deps look like wildcard versions
# but are fine — they always resolve locally. External wildcard
# `version = "*"` deps are still denied.
allow-wildcard-paths = true

[advisories]
yanked = "warn"
ignore = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = [
    "https://github.com/zed-industries/zed",
    "https://github.com/longbridge/gpui-component",
]
